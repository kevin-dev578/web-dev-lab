<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login Clone</title>

    <!-- CSS Link -->
    <link rel="stylesheet" href="./css/netflix-login.css">

    <!-- Font Attatchment -->
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
</head>
<body>
    <main>

        <div class="profile-gate">
            <h1>Who's watching?</h1>
            <div class="list-profiles">
                <div class="user-profile">
                    <a href="" aria-label="Login as Kevin"><img src="./images/user-profile-default.jpg" alt="Login image default"></a>
                    <p id="user-name1">Kevin</p>
                </div>
                <div class="user-profile">
                    <a href="" aria-label="Login as Guest"><img src="./images/user-profile.jpg" alt="Login image customized"></a>
                    <p id="user-name2">Guest</p>
                </div>
                <div class="user-profile">
                    <a href="" aria-label="Login as Kids"><img src="./images/user-profile-cust.jpg" alt="Login image customized"></a>
                    <p id="user-name3">Kids</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
