<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Kevin Mbemba Kiyindou">
    <title>Netflix Clone</title>

    <!-- Fonts that Netflix uses -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">

    <!-- Attachment of css link -->
    <link rel="stylesheet" href="./css/index.css">

    <!-- Attachment of Javascript -->
    <script src="../js/index.js" defer></script>

</head>

<body>
    <section class="hero">
        <div class="hero-content">
            <h1>Unlimited movies, TV shows and more.</h1>
            <p>Watch anywhere. Cancel anytime.</p>

            <div class="cta">
                <p>Ready to watch? Enter your email to create or restart your membership.</p>
                <form class="email-form">
                    <input id="email-address-field" type="email" placeholder="Email address" required>
                    <button type="submit" id="submit-Btn">Get Started &gt;</button>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
